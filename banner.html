<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1584px;
    height: 396px;
    background: linear-gradient(135deg, #080d1a 0%, #061224 45%, #0c1e33 75%, #08192c 100%);
    font-family: 'Segoe UI', system-ui, Arial, sans-serif;
    overflow: hidden;
  }
  .banner {
    width: 1584px;
    height: 396px;
    display: flex;
    align-items: center;
    position: relative;
  }
  svg.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  /* Left spacer - kept clear for profile photo overlap */
  .spacer { width: 420px; flex-shrink: 0; }
  /* Subtle vertical divider */
  .divider {
    width: 1px;
    height: 240px;
    background: linear-gradient(to bottom, transparent, rgba(56,189,248,0.5), transparent);
    flex-shrink: 0;
    margin-right: 56px;
  }
  .content {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
    padding-right: 80px;
  }
  .name { font-size: 52px; font-weight: 800; color: #ffffff; letter-spacing: -1px; line-height: 1.1; }
  .title { font-size: 19px; color: #38bdf8; font-weight: 500; letter-spacing: 0.3px; }
  .tags { display: flex; gap: 10px; flex-wrap: wrap; }
  .tag {
    background: rgba(56,189,248,0.1);
    border: 1px solid rgba(56,189,248,0.35);
    color: #7dd3fc;
    padding: 5px 15px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .sub { color: #3d5a73; font-size: 12.5px; margin-top: 2px; }
</style>
</head>
<body>
<svg class="bg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="15%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)"/>
  <rect width="100%" height="100%" fill="url(#g2)"/>
  <circle cx="210" cy="198" r="180" fill="none" stroke="#38bdf8" stroke-width="0.6" opacity="0.1"/>
  <circle cx="210" cy="198" r="280" fill="none" stroke="#38bdf8" stroke-width="0.4" opacity="0.06"/>
  <circle cx="210" cy="198" r="380" fill="none" stroke="#38bdf8" stroke-width="0.2" opacity="0.03"/>
  <line x1="0" y1="395" x2="1584" y2="395" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
</svg>
<div class="banner">
  <div class="spacer"></div>
  <div class="divider"></div>
  <div class="content">
    <div class="name">Mohammad Aghdam</div>
    <div class="title">AI Engineer &amp; Data Scientist &nbsp;&#124;&nbsp; PhD &nbsp;&#124;&nbsp; Geneva, Switzerland</div>
    <div class="tags">
      <span class="tag">LLMs &amp; GenAI</span>
      <span class="tag">MLOps &amp; Cloud</span>
      <span class="tag">Deep RL</span>
      <span class="tag">Multi-Agent Systems</span>
      <span class="tag">Azure &#8226; AWS &#8226; GCP</span>
      <span class="tag">Python &#8226; PyTorch &#8226; Databricks</span>
    </div>
    <div class="sub">mohammadaghdam.com &nbsp;&#8226;&nbsp; linkedin.com/in/mohammad-aghdam &nbsp;&#8226;&nbsp; github.com/maghdam &nbsp;&#8226;&nbsp; Swiss C Permit</div>
  </div>
</div>
</body>
</html>
